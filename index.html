<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Space System</title>

<style>
body{margin:0;font-family:Segoe UI;background:#071a2f;color:white}
header{background:#081f3a;padding:15px 8%;display:flex;justify-content:space-between}
.logo{font-size:22px;font-weight:bold}
section{padding:60px 8%}
.title{text-align:center;font-size:30px;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}
.card{background:#0d2b4c;padding:20px;border-radius:15px;text-align:center}
.card img{width:100%;border-radius:10px;margin-bottom:10px}
input,select{padding:10px;margin:5px;border:none;border-radius:8px}
button{background:#28c76f;color:white;border:none;padding:10px 20px;border-radius:25px;font-weight:bold;cursor:pointer}
.dashboard{background:#0d2b4c;padding:20px;border-radius:15px;margin-top:30px}
</style>
</head>

<body>

<header>
<div class="logo">AUTO SPACE ADMIN SYSTEM</div>
</header>

<!-- VEHICLES -->
<section>
<h2 class="title">Vehicle Listings</h2>
<div class="grid" id="listings"></div>
</section>

<!-- ADMIN ADD -->
<section>
<h2 class="title">Add Vehicle</h2>

<input id="name" placeholder="Vehicle Name">
<input id="price" placeholder="Price">
<select id="type">
<option>Car</option>
<option>Bike</option>
<option>Threewheel</option>
</select>
<input type="file" id="img">

<br><br>
<button onclick="addVehicle()">Add Vehicle</button>
</section>

<!-- INQUIRY DASHBOARD -->
<section>
<h2 class="title">Customer Inquiries</h2>
<div class="dashboard" id="inquiries"></div>
</section>

<!-- BOOKINGS DASHBOARD -->
<section>
<h2 class="title">Bookings</h2>
<div class="dashboard" id="bookings"></div>
</section>

<script>

/* DATABASE */
let vehicles=JSON.parse(localStorage.getItem("vehicles"))||[];
let inquiries=JSON.parse(localStorage.getItem("inquiries"))||[];
let bookings=JSON.parse(localStorage.getItem("bookings"))||[];

/* SAVE */
function save(){
localStorage.setItem("vehicles",JSON.stringify(vehicles));
localStorage.setItem("inquiries",JSON.stringify(inquiries));
localStorage.setItem("bookings",JSON.stringify(bookings));
}

/* RENDER VEHICLES */
function render(){
let box=document.getElementById("listings");
box.innerHTML="";

vehicles.forEach((v,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${v.img}">
<h3>${v.name}</h3>
<p>${v.type}</p>
<b>${v.price}</b><br><br>

<button onclick="inquire(${i})">Inquire</button>
<button onclick="book(${i})">Book</button>
</div>`;
});
renderDashboards();
}

/* ADD VEHICLE */
function addVehicle(){
let file=document.getElementById("img").files[0];
let reader=new FileReader();

reader.onload=function(){
vehicles.push({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
type:document.getElementById("type").value,
img:reader.result
});
save();
render();
};

if(file) reader.readAsDataURL(file);
}

/* INQUIRY */
function inquire(i){
let name=prompt("Customer Name");
let phone=prompt("Phone Number");

inquiries.push({
vehicle:vehicles[i].name,
name,
phone,
date:new Date().toLocaleString()
});

save();
renderDashboards();
}

/* BOOK */
function book(i){
let name=prompt("Customer Name");
let phone=prompt("Phone Number");

bookings.push({
vehicle:vehicles[i].name,
name,
phone,
date:new Date().toLocaleString()
});

save();
renderDashboards();
}

/* DASHBOARDS */
function renderDashboards(){

document.getElementById("inquiries").innerHTML=
inquiries.map(i=>`• ${i.vehicle} — ${i.name} (${i.phone})`).join("<br>");

document.getElementById("bookings").innerHTML=
bookings.map(b=>`• ${b.vehicle} — ${b.name} (${b.phone})`).join("<br>");
}

render();

</script>
</body>
</html>
